[workspace]
resolver = "2"
members = [
    "crates/adapter",
    "crates/validate",
    "crates/extract",
    "crates/gencontract",
    "crates/codegen",
    "crates/cli",
]

[workspace.package]
edition = "2021"
license = "MIT"
publish = false

[workspace.dependencies]
# Internal crates
sysml-v2-adapter = { path = "crates/adapter" }
sysml-v2-validate = { path = "crates/validate" }
sysml-v2-extract = { path = "crates/extract" }
sysml-v2-gencontract = { path = "crates/gencontract" }
sysml-v2-codegen = { path = "crates/codegen" }

# External — parser foundation
syster-base = "=0.4.0-alpha"

# External — shared
thiserror = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
toml = "0.8"
clap = { version = "4", features = ["derive"] }
petgraph = "0.7"
