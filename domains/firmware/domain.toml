[domain]
name = "firmware"
description = "Embedded firmware domain — layered architecture with memory, concurrency, and error-handling metadata"
metadata_library = "firmware_library.sysml"

[layers]
order = ["application", "middleware", "driver", "hal", "pac"]

[layers.allowed_deps]
application = ["middleware"]
middleware = ["driver", "hal"]
driver = ["hal"]
hal = ["pac"]
pac = []

[required_metadata]
parts = ["MemoryModel", "ConcurrencyModel", "ErrorHandling"]

[validation.rules]
LAYER001 = "error"
LAYER002 = "error"
META010 = "error"
META011 = "warning"
FSM020 = "error"
FSM021 = "error"
FSM022 = "warning"
PORT030 = "error"
TYPE040 = "warning"
UI001 = "error"       # Element bounds exceed display resolution
UI002 = "warning"     # Element overlap without visible_when
UI003 = "error"       # Font/icon asset reference not found
UI004 = "error"       # Data binding references non-existent module
UI005 = "warning"     # Indicator color not achievable by LED hardware
UI006 = "error"       # Gesture device reference not found
UI007 = "error"       # Screen display reference not found
UI008 = "error"       # Indicator LED reference not found

[source]
root = "src"
language = "rust"
layout = "flat"

[type_map.rust]
Integer = "i32"
Boolean = "bool"
String = "String"
Real = "f64"

[type_map.c]
Integer = "int32_t"
Boolean = "bool"
String = "const char*"
Real = "double"
